<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Terrain Shooter</title>
  <link rel="stylesheet" href="/minecraft/styles.css" />
</head>

<body>
  <div class="hud">
    <div class="hud-info">
      <h1>Terrain Shooter</h1>
      <p>W/S move. A/D or ←/→ turn. Q/E strafe. Touch: left pad to move/turn, ▲▼⚡ on right. Double-tap ▲ for fly mode.</p>
      <a class="back-link" href="../index.html">← Back</a>
    </div>
    <details class="hud-controls" id="heightmap-panel">
      <summary title="Heightmap settings">&#9776;</summary>
      <label class="file">
        Bitmap
        <input id="heightmap" type="file" accept="image/*" />
      </label>
      <label class="url">
        URL
        <input id="heightmap-url" type="text" placeholder="https://..." />
        <button id="load-url" type="button">Load</button>
      </label>
      <div class="altitudes" aria-label="Altitude presets">
        <button data-alt="2">1</button>
        <button data-alt="6">2</button>
        <button data-alt="12">3</button>
        <button data-alt="24">4</button>
        <button data-alt="40">5</button>
      </div>
    </details>
  </div>

  <details class="inventory" id="inventory-panel" open>
    <summary>&#9776;</summary>
    <div class="inventory-grid" id="inventory"></div>
    <div class="action-bar" id="action-bar" aria-label="Action bar slots"></div>
  </details>

  <div id="viewport"></div>
  <div class="crosshair" aria-hidden="true"></div>
  <div class="status" id="status">Ready</div>
  <div class="debug" id="debug">Place a block to see coordinates</div>

  <!-- Mobile touch controllers -->
  <div class="mobile-controls" id="mobile-controls" aria-label="Mobile controls">
    <div class="gesture-pad" id="gesture-pad" aria-label="Move and turn"></div>
    <div class="right-buttons">
      <button class="ctrl-btn" id="btn-up" aria-label="Jump / Fly up">&#9650;</button>
      <button class="ctrl-btn" id="btn-turbo" aria-label="Turbo">&#9889;</button>
      <button class="ctrl-btn" id="btn-down" aria-label="Fly down">&#9660;</button>
    </div>
  </div>

  <!-- Portrait mode overlay -->
  <div class="portrait-overlay" id="portrait-overlay" aria-hidden="true">
    <span>&#128260; Rotate to landscape</span>
  </div>

  <script type="module" src="/minecraft/main.js"></script>
</body>

</html>
